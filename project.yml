name: Twist
options:
  bundleIdPrefix: com.n2o
  deploymentTarget:
    iOS: "16.0"

targets:
  Twist:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Twist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.n2o.twist
        SWIFT_VERSION: "5.9"
        SWIFT_STRICT_CONCURRENCY: minimal
        DEVELOPMENT_TEAM: L5CV7SXRUM
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        CODE_SIGN_ENTITLEMENTS: Twist/Twist.entitlements
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
    info:
      path: Twist/Info.plist
      properties:
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        NSAppleMusicUsageDescription: "Twist needs access to add playlists to your Apple Music library."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - twist
            CFBundleURLName: com.n2o.twist
