name: Twist
options:
  bundleIdPrefix: com.n2o
  deploymentTarget:
    iOS: "16.0"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"

targets:
  Twist:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Twist
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.n2o.twist
        SWIFT_VERSION: "5.9"
        SWIFT_STRICT_CONCURRENCY: minimal
        DEVELOPMENT_TEAM: L5CV7SXRUM
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        CODE_SIGN_ENTITLEMENTS: Twist/Twist.entitlements
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
    info:
      path: Twist/Info.plist
      properties:
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        NSAppleMusicUsageDescription: "Twist needs access to add playlists to your Apple Music library."
        GADApplicationIdentifier: "ca-app-pub-5093550276623040~1162178047"
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: "cstr6suwn9.skadnetwork"
          - SKAdNetworkIdentifier: "4fzdc2evr5.skadnetwork"
          - SKAdNetworkIdentifier: "2fnua5tdw4.skadnetwork"
          - SKAdNetworkIdentifier: "ydx93a7ass.skadnetwork"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - twist
            CFBundleURLName: com.n2o.twist
